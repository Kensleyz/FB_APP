name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run tests
        run: dotnet test --configuration Release --verbosity minimal

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image names
        run: |
          echo "API_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/api" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV
          echo "FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ github.repository }}/frontend" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Trigger Render API deploy
        if: ${{ secrets.RENDER_API_DEPLOY_HOOK != '' }}
        run: curl -fsSL "${{ secrets.RENDER_API_DEPLOY_HOOK }}" -o /dev/null

      - name: Trigger Render Frontend deploy
        if: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK != '' }}
        run: curl -fsSL "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}" -o /dev/null
